<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hyperliquid TradFi Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --fg: #c8c8c8;
      --green: #00ff88;
      --red: #ff4444;
      --amber: #ff9900;
      --blue: #4488ff;
      --dim: #888888;
      --border: #222;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    #terminal-container {
      width: 100%;
      max-width: 900px;
      border: 1px solid var(--border);
      background: var(--bg);
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .header-title {
      color: var(--amber);
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 1px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      display: inline-block;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .live-dot.offline {
      background: var(--red);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .live-label {
      color: var(--green);
      font-size: 12px;
    }

    .live-label.offline {
      color: var(--red);
    }

    .timestamp {
      color: var(--blue);
      font-size: 12px;
    }

    .weekend-badge {
      display: none;
      color: var(--amber);
      font-size: 12px;
      border: 1px solid var(--amber);
      padding: 1px 6px;
      border-radius: 3px;
    }

    .weekend-badge.visible {
      display: inline-block;
    }

    /* Table */
    .table-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead th {
      text-align: right;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--dim);
      font-weight: 400;
      font-size: 11px;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    thead th:first-child {
      text-align: left;
    }

    tbody td {
      text-align: right;
      padding: 6px 12px;
      border-bottom: 1px solid #151515;
      white-space: nowrap;
    }

    tbody td:first-child {
      text-align: left;
    }

    tr.cat-row td {
      color: var(--amber);
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 1px;
      padding-top: 12px;
      border-bottom: none;
    }

    tr.data-row:hover {
      background: #111;
    }

    .positive { color: var(--green); }
    .negative { color: var(--red); }
    .neutral  { color: var(--dim); }
    .na       { color: #444; }

    .instrument-name {
      color: var(--fg);
      font-weight: 600;
    }

    /* Footer */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--dim);
    }

    .footer-note {
      color: #444;
    }

    #screenshot-btn {
      background: none;
      border: 1px solid var(--amber);
      color: var(--amber);
      font-family: inherit;
      font-size: 12px;
      padding: 4px 12px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s;
    }

    #screenshot-btn:hover {
      background: #1a1200;
    }

    /* Flash effect */
    .flash {
      animation: flash-anim 0.3s ease-out;
    }

    @keyframes flash-anim {
      0% { filter: brightness(2); }
      100% { filter: brightness(1); }
    }

    /* Data rows clickable */
    tr.data-row {
      cursor: pointer;
    }

    tr.data-row:active {
      background: #1a1a1a;
    }

    /* Chart bottom sheet */
    .chart-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
    }

    .chart-backdrop.open {
      display: block;
    }

    .chart-sheet {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 70vh;
      background: #0d0d0d;
      border-top: 2px solid var(--amber);
      z-index: 101;
      transform: translateY(100%);
      transition: transform 0.3s ease-out;
      display: flex;
      flex-direction: column;
      border-radius: 12px 12px 0 0;
    }

    .chart-sheet.open {
      transform: translateY(0);
    }

    .chart-handle {
      width: 40px;
      height: 4px;
      background: #444;
      border-radius: 2px;
      margin: 8px auto 4px;
      flex-shrink: 0;
    }

    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 16px 8px;
      flex-shrink: 0;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chart-info {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .chart-symbol {
      color: var(--amber);
      font-weight: 600;
      font-size: 16px;
      letter-spacing: 1px;
    }

    .chart-price {
      color: var(--fg);
      font-size: 14px;
    }

    .chart-intervals {
      display: flex;
      gap: 4px;
    }

    .chart-intervals button {
      background: #1a1a1a;
      border: 1px solid #333;
      color: var(--dim);
      font-family: inherit;
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
      min-width: 36px;
      transition: all 0.15s;
    }

    .chart-intervals button.active {
      background: var(--amber);
      color: #000;
      border-color: var(--amber);
      font-weight: 600;
    }

    .chart-intervals button:not(.active):hover {
      border-color: var(--amber);
      color: var(--fg);
    }

    .chart-close {
      background: none;
      border: none;
      color: var(--dim);
      font-size: 24px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }

    .chart-close:hover {
      color: var(--fg);
    }

    .chart-container {
      flex: 1;
      min-height: 0;
      position: relative;
    }

    .chart-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--dim);
      font-size: 13px;
      z-index: 2;
      pointer-events: none;
    }

    .chart-loading.hidden {
      display: none;
    }

    /* Responsive */
    @media (max-width: 640px) {
      body { padding: 8px; font-size: 12px; }
      table { font-size: 11px; }
      thead th, tbody td { padding: 5px 6px; }
      .header { padding: 8px 10px; }
      .header-title { font-size: 12px; }
      .chart-sheet { height: 75vh; }
      .chart-intervals button { padding: 6px 8px; font-size: 11px; min-width: 32px; }
    }

    @media (min-width: 900px) {
      .chart-sheet { height: 60vh; max-width: 900px; left: 50%; right: auto; width: 100%; transform: translateX(-50%) translateY(100%); }
      .chart-sheet.open { transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>
  <div id="terminal-container">
    <div class="header">
      <span class="header-title">HYPERLIQUID TRADFI TERMINAL</span>
      <div class="header-right">
        <span><span class="live-dot" id="live-dot"></span> <span class="live-label" id="live-label">LIVE</span></span>
        <span class="timestamp" id="timestamp"></span>
        <span class="weekend-badge" id="weekend-badge">⚠ WEEKEND</span>
      </div>
    </div>
    <div class="table-wrapper">
      <table id="terminal">
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="footer">
      <span>Source: Hyperliquid HIP-3 (xyz/cash) · Perps mid-price · <span class="footer-note">NOT financial advice</span></span>
      <button id="screenshot-btn">📸 SCREENSHOT</button>
    </div>
  </div>

  <!-- Chart bottom sheet -->
  <div class="chart-backdrop" id="chart-backdrop"></div>
  <div class="chart-sheet" id="chart-sheet">
    <div class="chart-handle"></div>
    <div class="chart-header">
      <div class="chart-info">
        <span class="chart-symbol" id="chart-symbol"></span>
        <span class="chart-price" id="chart-price"></span>
      </div>
      <div class="chart-intervals" id="chart-intervals">
        <button data-interval="1m">1m</button>
        <button data-interval="5m">5m</button>
        <button data-interval="15m">15m</button>
        <button data-interval="1h" class="active">1H</button>
        <button data-interval="4h">4H</button>
        <button data-interval="1d">1D</button>
      </div>
      <button class="chart-close" id="chart-close">&times;</button>
    </div>
    <div class="chart-container" id="chart-container">
      <div class="chart-loading" id="chart-loading">Loading...</div>
    </div>
  </div>

  <script src="https://unpkg.com/lightweight-charts@5.1.0/dist/lightweight-charts.standalone.production.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    // ── Config ──────────────────────────────────────────────────────────
    const INSTRUMENTS = [
      { id: 'XYZ100',   dex: 'xyz',  label: 'NDX100',   category: 'INDEX', decimals: 1 },
      { id: 'USA500',   dex: 'cash', label: 'S&P 500',  category: 'INDEX', decimals: 1 },
      { id: 'CL',       dex: 'xyz',  label: 'WTI OIL',  category: 'CMDTY', decimals: 2 },
      { id: 'BRENTOIL', dex: 'xyz',  label: 'BRENT',    category: 'CMDTY', decimals: 2 },
      { id: 'GOLD',     dex: 'xyz',  label: 'GOLD',     category: 'CMDTY', decimals: 1 },
      { id: 'SILVER',   dex: 'xyz',  label: 'SILVER',   category: 'CMDTY', decimals: 2 },
      { id: 'NATGAS',   dex: 'xyz',  label: 'NAT GAS',  category: 'CMDTY', decimals: 3 },
      { id: 'COPPER',   dex: 'xyz',  label: 'COPPER',   category: 'CMDTY', decimals: 3 },
      { id: 'EUR',      dex: 'xyz',  label: 'EUR/USD',  category: 'FX',    decimals: 4 },
      { id: 'JPY',      dex: 'xyz',  label: 'USD/JPY',  category: 'FX',    decimals: 2 },
      { id: 'BTC',      dex: '',     label: 'BTC',      category: 'CRYPTO', decimals: 1 },
      { id: 'ETH',      dex: '',     label: 'ETH',      category: 'CRYPTO', decimals: 2 },
    ];

    const CATEGORIES = ['INDEX', 'CMDTY', 'FX', 'CRYPTO'];
    const CAT_LABELS = { INDEX: 'INDEX', CMDTY: 'CMDTY', FX: 'FX', CRYPTO: 'CRYPTO' };

    const API = 'https://api.hyperliquid.xyz/info';

    // ── State ───────────────────────────────────────────────────────────
    const state = {};
    let midsData = { main: {}, xyz: {}, cash: {} };
    let lastSuccessfulFetch = Date.now();
    let prevWeekend = null;

    // ── API helpers ─────────────────────────────────────────────────────
    async function postAPI(body) {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error(`API ${res.status}`);
      return res.json();
    }

    async function fetchAllMids() {
      try {
        const [main, xyz, cash] = await Promise.all([
          postAPI({ type: 'allMids' }),
          postAPI({ type: 'allMids', dex: 'xyz' }),
          postAPI({ type: 'allMids', dex: 'cash' }),
        ]);
        midsData = { main, xyz, cash };
        lastSuccessfulFetch = Date.now();
      } catch (e) {
        console.error('fetchAllMids error:', e);
        scheduleRetry(fetchAllMids, 5000);
      }

      // Update prices in state
      for (const inst of INSTRUMENTS) {
        if (!state[inst.id]) state[inst.id] = {};
        let raw = null;

        if (inst.dex === '') {
          // Main dex: key is bare ticker
          raw = midsData.main[inst.id];
        } else {
          // HIP-3 dex: try multiple key formats
          const src = inst.dex === 'xyz' ? midsData.xyz : midsData.cash;
          raw = src[inst.id]                          // bare: "CL"
            ?? src[`${inst.dex}:${inst.id}`]          // prefixed: "xyz:CL"
            ?? src[inst.id.toUpperCase()]              // uppercase variant
            ?? null;

          // Fallback: search other dex if not found
          if (raw == null) {
            const other = inst.dex === 'xyz' ? midsData.cash : midsData.xyz;
            raw = other[inst.id] ?? other[`${inst.dex === 'xyz' ? 'cash' : 'xyz'}:${inst.id}`] ?? null;
          }
        }

        state[inst.id].price = raw != null ? parseFloat(raw) : null;
      }

      // Debug: log first fetch to help diagnose missing data
      if (!fetchAllMids._logged) {
        fetchAllMids._logged = true;
        console.log('allMids main keys:', Object.keys(midsData.main).slice(0, 10));
        console.log('allMids xyz keys:', Object.keys(midsData.xyz).slice(0, 20));
        console.log('allMids cash keys:', Object.keys(midsData.cash).slice(0, 20));
        console.log('allMids xyz sample:', JSON.stringify(midsData.xyz).slice(0, 300));
        console.log('allMids cash sample:', JSON.stringify(midsData.cash).slice(0, 300));
      }
    }

    function coinKey(inst) {
      return inst.dex ? `${inst.dex}:${inst.id}` : inst.id;
    }

    async function fetchDailyCandle(inst) {
      const now = Date.now();
      const twoDaysAgo = now - 2 * 24 * 60 * 60 * 1000;
      try {
        const candles = await postAPI({
          type: 'candleSnapshot',
          req: { coin: coinKey(inst), interval: '1d', startTime: twoDaysAgo, endTime: now },
        });
        if (candles && candles.length > 0) {
          const last = candles[candles.length - 1];
          if (!state[inst.id]) state[inst.id] = {};
          state[inst.id].dayOpen = parseFloat(last.o);
          state[inst.id].dayHigh = parseFloat(last.h);
          // Use candle close as price fallback if allMids didn't return data
          if (state[inst.id].price == null) {
            state[inst.id].price = parseFloat(last.c);
          }
        }
      } catch (e) {
        console.error(`candle error ${inst.id}:`, e);
      }
    }

    async function fetchAllDailyCandles() {
      const results = await Promise.allSettled(INSTRUMENTS.map(fetchDailyCandle));
      // errors handled inside each call
    }

    function getFridayCloseUTC() {
      const now = new Date();
      const day = now.getUTCDay(); // 0=Sun, 6=Sat
      let daysBack;
      if (day === 0) daysBack = 2;
      else if (day === 6) daysBack = 1;
      else if (day === 5) daysBack = 0;
      else return null;

      const friday = new Date(now);
      friday.setUTCDate(friday.getUTCDate() - daysBack);
      friday.setUTCHours(22, 0, 0, 0);
      return friday.getTime();
    }

    async function fetchWeekendRange(inst) {
      const fridayMs = getFridayCloseUTC();
      if (!fridayMs) return;
      try {
        const candles = await postAPI({
          type: 'candleSnapshot',
          req: { coin: coinKey(inst), interval: '1h', startTime: fridayMs, endTime: Date.now() },
        });
        if (candles && candles.length > 0) {
          let wkdHigh = -Infinity, wkdLow = Infinity;
          for (const c of candles) {
            const h = parseFloat(c.h), l = parseFloat(c.l);
            if (h > wkdHigh) wkdHigh = h;
            if (l < wkdLow) wkdLow = l;
          }
          if (!state[inst.id]) state[inst.id] = {};
          state[inst.id].wkdHigh = wkdHigh;
          state[inst.id].wkdLow = wkdLow;
          // Use latest candle close as price fallback if allMids didn't return data
          const lastCandle = candles[candles.length - 1];
          if (state[inst.id].price == null && lastCandle) {
            state[inst.id].price = parseFloat(lastCandle.c);
          }
          // Use first candle open as dayOpen fallback for change calculation
          if (state[inst.id].dayOpen == null && candles[0]) {
            state[inst.id].dayOpen = parseFloat(candles[0].o);
          }
        }
      } catch (e) {
        console.error(`weekend range error ${inst.id}:`, e);
      }
    }

    async function fetchAllWeekendRanges() {
      if (!isWeekend()) return;
      await Promise.allSettled(INSTRUMENTS.map(fetchWeekendRange));
    }

    function scheduleRetry(fn, delay) {
      setTimeout(() => fn(), delay);
    }

    // ── Weekend detection ───────────────────────────────────────────────
    function isWeekend() {
      const now = new Date();
      const day = now.getUTCDay();
      const hour = now.getUTCHours();
      if (day === 6) return true;                    // Saturday
      if (day === 0 && hour < 23) return true;       // Sunday before 23 UTC
      if (day === 5 && hour >= 22) return true;      // Friday after 22 UTC
      return false;
    }

    // ── Formatting ──────────────────────────────────────────────────────
    function fmt(val, decimals) {
      if (val == null || isNaN(val)) return 'N/A';
      return val.toLocaleString('en-US', {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals,
      });
    }

    function fmtChange(val, decimals) {
      if (val == null || isNaN(val)) return 'N/A';
      const sign = val > 0 ? '+' : '';
      return sign + fmt(val, decimals);
    }

    function fmtPct(val) {
      if (val == null || isNaN(val)) return 'N/A';
      const sign = val > 0 ? '+' : '';
      return sign + val.toFixed(2) + '%';
    }

    function changeClass(val) {
      if (val == null || isNaN(val)) return 'na';
      if (val > 0) return 'positive';
      if (val < 0) return 'negative';
      return 'neutral';
    }

    // ── Rendering ───────────────────────────────────────────────────────
    function renderHeader() {
      const weekend = isWeekend();
      const thead = document.getElementById('thead');

      // Toggle weekend badge
      document.getElementById('weekend-badge').classList.toggle('visible', weekend);

      // Build header row
      let cols = '<th>INSTRUMENT</th><th>PRICE</th><th>CHG 24H</th><th>CHG %</th>';
      if (weekend) {
        cols += '<th>WKD LOW</th><th>WKD HIGH</th>';
      } else {
        cols += '<th>DAY HIGH</th>';
      }
      thead.innerHTML = '<tr>' + cols + '</tr>';
    }

    function renderTable() {
      const weekend = isWeekend();
      const tbody = document.getElementById('tbody');
      const colCount = weekend ? 6 : 5;
      let html = '';

      for (const cat of CATEGORIES) {
        const items = INSTRUMENTS.filter(i => i.category === cat);
        if (items.length === 0) continue;

        // Category separator
        html += `<tr class="cat-row"><td colspan="${colCount}">── ${CAT_LABELS[cat]} ──</td></tr>`;

        for (const inst of items) {
          const s = state[inst.id] || {};
          const price = s.price;
          const chg = (price != null && s.dayOpen != null) ? price - s.dayOpen : null;
          const chgPct = (chg != null && s.dayOpen) ? (chg / s.dayOpen) * 100 : null;

          html += `<tr class="data-row" data-inst-id="${inst.id}">`;
          html += `<td class="instrument-name">${inst.label}</td>`;
          html += `<td>${price != null ? fmt(price, inst.decimals) : '<span class="na">N/A</span>'}</td>`;
          html += `<td class="${changeClass(chg)}">${fmtChange(chg, inst.decimals)}</td>`;
          html += `<td class="${changeClass(chgPct)}">${fmtPct(chgPct)}</td>`;

          if (weekend) {
            html += `<td>${s.wkdLow != null ? fmt(s.wkdLow, inst.decimals) : '<span class="na">—</span>'}</td>`;
            html += `<td>${s.wkdHigh != null ? fmt(s.wkdHigh, inst.decimals) : '<span class="na">—</span>'}</td>`;
          } else {
            html += `<td>${s.dayHigh != null ? fmt(s.dayHigh, inst.decimals) : '<span class="na">—</span>'}</td>`;
          }

          html += '</tr>';
        }
      }

      tbody.innerHTML = html;
    }

    function updateClock() {
      const now = new Date();
      const utc = now.toUTCString().slice(0, -4); // remove " GMT"
      const days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
      const day = days[now.getUTCDay()];
      const hh = String(now.getUTCHours()).padStart(2, '0');
      const mm = String(now.getUTCMinutes()).padStart(2, '0');
      const ss = String(now.getUTCSeconds()).padStart(2, '0');
      document.getElementById('timestamp').textContent = `${day} ${hh}:${mm}:${ss} UTC`;

      // Check online/offline
      const elapsed = Date.now() - lastSuccessfulFetch;
      const dot = document.getElementById('live-dot');
      const label = document.getElementById('live-label');
      if (elapsed > 30000) {
        dot.classList.add('offline');
        label.classList.add('offline');
        label.textContent = 'OFFLINE';
      } else {
        dot.classList.remove('offline');
        label.classList.remove('offline');
        label.textContent = 'LIVE';
      }

      // Check weekend state change
      const wk = isWeekend();
      if (prevWeekend !== wk) {
        prevWeekend = wk;
        renderHeader();
        renderTable();
      }
    }

    // ── Screenshot ──────────────────────────────────────────────────────
    document.getElementById('screenshot-btn').addEventListener('click', async () => {
      const container = document.getElementById('terminal-container');
      container.classList.add('flash');
      setTimeout(() => container.classList.remove('flash'), 300);

      try {
        const canvas = await html2canvas(container, {
          backgroundColor: '#0a0a0a',
          scale: 2,
        });
        const dataUrl = canvas.toDataURL('image/png');
        const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
        const filename = `hyperliquid-terminal-${ts}.png`;

        // Try Web Share API (mobile)
        if (navigator.canShare) {
          try {
            const blob = await (await fetch(dataUrl)).blob();
            const file = new File([blob], filename, { type: 'image/png' });
            if (navigator.canShare({ files: [file] })) {
              await navigator.share({ files: [file], title: 'Hyperliquid Terminal' });
              return;
            }
          } catch (e) { /* fallback to download */ }
        }

        // Download fallback
        const a = document.createElement('a');
        a.href = dataUrl;
        a.download = filename;
        a.click();
      } catch (e) {
        console.error('Screenshot error:', e);
      }
    });

    // ── Chart bottom sheet ────────────────────────────────────────────
    let chart = null;
    let candleSeries = null;
    let chartInst = null;        // currently displayed instrument config
    let chartInterval = '1h';    // current interval
    let chartUpdateTimer = null;

    // Interval -> how far back to fetch (ms) and candle count target
    const INTERVAL_CONFIG = {
      '1m':  { ms: 4 * 60 * 60 * 1000,       label: '1m' },   // 4h of 1m candles
      '5m':  { ms: 20 * 60 * 60 * 1000,      label: '5m' },   // 20h
      '15m': { ms: 3 * 24 * 60 * 60 * 1000,  label: '15m' },  // 3d
      '1h':  { ms: 14 * 24 * 60 * 60 * 1000, label: '1h' },   // 14d
      '4h':  { ms: 45 * 24 * 60 * 60 * 1000, label: '4h' },   // 45d
      '1d':  { ms: 180 * 24 * 60 * 60 * 1000, label: '1d' },  // 180d
    };

    function initChart() {
      const container = document.getElementById('chart-container');
      chart = LightweightCharts.createChart(container, {
        width: container.clientWidth,
        height: container.clientHeight,
        layout: {
          background: { type: 'solid', color: '#0d0d0d' },
          textColor: '#888',
          fontFamily: "'Fira Code', monospace",
          fontSize: 11,
        },
        grid: {
          vertLines: { color: '#1a1a1a' },
          horzLines: { color: '#1a1a1a' },
        },
        crosshair: {
          mode: 0, // Normal crosshair
          vertLine: { color: '#ff990066', width: 1, style: 2 },
          horzLine: { color: '#ff990066', width: 1, style: 2 },
        },
        rightPriceScale: {
          borderColor: '#222',
          scaleMargins: { top: 0.1, bottom: 0.1 },
        },
        timeScale: {
          borderColor: '#222',
          timeVisible: true,
          secondsVisible: false,
          rightOffset: 7,
        },
        handleScroll: { mouseWheel: true, pressedMouseMove: true, horzTouchDrag: true, vertTouchDrag: false },
        handleScale: { mouseWheel: true, pinch: true },
      });

      candleSeries = chart.addSeries(LightweightCharts.CandlestickSeries, {
        upColor: '#00ff88',
        downColor: '#ff4444',
        borderVisible: false,
        wickUpColor: '#00ff88',
        wickDownColor: '#ff4444',
      });

      // Resize observer
      const ro = new ResizeObserver(() => {
        if (chart) chart.resize(container.clientWidth, container.clientHeight);
      });
      ro.observe(container);
    }

    async function fetchChartCandles(inst, interval) {
      const cfg = INTERVAL_CONFIG[interval];
      const now = Date.now();
      const startTime = now - cfg.ms;
      const candles = await postAPI({
        type: 'candleSnapshot',
        req: {
          coin: coinKey(inst),
          interval: cfg.label,
          startTime,
          endTime: now,
        },
      });
      if (!candles || !Array.isArray(candles)) return [];
      return candles.map(c => ({
        time: Math.floor(c.t / 1000),
        open: parseFloat(c.o),
        high: parseFloat(c.h),
        low: parseFloat(c.l),
        close: parseFloat(c.c),
      }));
    }

    async function loadChart(inst, interval) {
      const loading = document.getElementById('chart-loading');
      loading.classList.remove('hidden');

      document.getElementById('chart-symbol').textContent = inst.label;
      const s = state[inst.id] || {};
      document.getElementById('chart-price').textContent = s.price != null ? fmt(s.price, inst.decimals) : '—';

      try {
        const data = await fetchChartCandles(inst, interval);
        candleSeries.setData(data);
        chart.timeScale().fitContent();
      } catch (e) {
        console.error('Chart load error:', e);
      } finally {
        loading.classList.add('hidden');
      }
    }

    function openChart(inst) {
      chartInst = inst;
      chartInterval = '1h';

      // Highlight active interval button
      document.querySelectorAll('#chart-intervals button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.interval === chartInterval);
      });

      if (!chart) initChart();

      document.getElementById('chart-backdrop').classList.add('open');
      document.getElementById('chart-sheet').classList.add('open');
      document.body.style.overflow = 'hidden'; // prevent background scroll

      // Small delay to let transition start, then load data
      setTimeout(() => {
        chart.resize(
          document.getElementById('chart-container').clientWidth,
          document.getElementById('chart-container').clientHeight
        );
        loadChart(inst, chartInterval);
      }, 50);

      // Auto-update price in chart header every 10s
      clearInterval(chartUpdateTimer);
      chartUpdateTimer = setInterval(() => {
        if (!chartInst) return;
        const s = state[chartInst.id] || {};
        document.getElementById('chart-price').textContent = s.price != null ? fmt(s.price, chartInst.decimals) : '—';
      }, 10000);
    }

    function closeChart() {
      document.getElementById('chart-sheet').classList.remove('open');
      document.getElementById('chart-backdrop').classList.remove('open');
      document.body.style.overflow = '';
      clearInterval(chartUpdateTimer);
      chartInst = null;
    }

    // Event: close chart
    document.getElementById('chart-close').addEventListener('click', closeChart);
    document.getElementById('chart-backdrop').addEventListener('click', closeChart);

    // Event: interval buttons
    document.getElementById('chart-intervals').addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-interval]');
      if (!btn || !chartInst) return;
      const interval = btn.dataset.interval;
      if (interval === chartInterval) return;

      chartInterval = interval;
      document.querySelectorAll('#chart-intervals button').forEach(b => {
        b.classList.toggle('active', b.dataset.interval === interval);
      });
      loadChart(chartInst, interval);
    });

    // ── Init & polling ──────────────────────────────────────────────────
    async function init() {
      renderHeader();
      renderTable();

      // Click on instrument row -> open chart
      document.getElementById('tbody').addEventListener('click', (e) => {
        const row = e.target.closest('tr.data-row[data-inst-id]');
        if (!row) return;
        const instId = row.dataset.instId;
        const inst = INSTRUMENTS.find(i => i.id === instId);
        if (inst) openChart(inst);
      });

      // Initial data load
      await fetchAllMids();
      renderTable();

      await Promise.all([fetchAllDailyCandles(), fetchAllWeekendRanges()]);
      renderTable();

      // Polling intervals
      setInterval(async () => {
        await fetchAllMids();
        renderTable();
      }, 10000);

      setInterval(async () => {
        await fetchAllDailyCandles();
        renderTable();
      }, 300000);

      setInterval(async () => {
        await fetchAllWeekendRanges();
        renderTable();
      }, 300000);

      // Clock every second
      setInterval(updateClock, 1000);
      updateClock();
    }

    init();
  </script>
</body>
</html>
